<div><app-page-breadcrumb [pageTitle]="isEditMode ? 'Editar Cliente' : 'Nuevo Cliente'" /></div>

<div class="mx-auto max-w-screen-md p-4 md:p-6 2xl:p-10">
  <div *ngIf="loadingData" class="flex justify-center py-20">
    <div class="h-12 w-12 animate-spin rounded-full border-4 border-solid border-primary border-t-transparent"></div>
  </div>

  <div *ngIf="!loadingData">
    <div class="mb-6 flex items-center gap-4">
      <button (click)="onCancel()" class="text-sm text-gray-500 hover:text-primary">← Volver</button>
      <h2 class="text-2xl font-bold text-black dark:text-white">{{ isEditMode ? 'Editar Cliente' : 'Nuevo Cliente' }}</h2>
    </div>

    <div *ngIf="error" class="mb-5 rounded-md border border-red-200 bg-red-50 p-4 text-red-700 dark:border-red-800 dark:bg-red-900/20 dark:text-red-400">{{ error }}</div>

    <form (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Vinculación al sistema -->
      <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
        <h3 class="mb-2 font-semibold text-black dark:text-white">Vinculación al Sistema</h3>
        <p class="text-sm text-gray-500 mb-5">Un cliente debe estar vinculado a un usuario del sistema.</p>
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
          <div>
            <label class="mb-2 block text-sm font-medium text-black dark:text-white">ID de Usuario <span class="text-red-500">*</span></label>
            <input type="number" [(ngModel)]="form.userId" name="userId" required min="1"
              [disabled]="isEditMode" placeholder="ID del usuario del sistema"
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white disabled:bg-gray-100 disabled:cursor-not-allowed dark:disabled:bg-gray-800" />
            <p *ngIf="isEditMode" class="mt-1 text-xs text-gray-400">El usuario no puede modificarse una vez creado.</p>
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-black dark:text-white">ID de Empresa</label>
            <input type="number" [(ngModel)]="form.companyId" name="companyId" min="1"
              placeholder="ID de la empresa (opcional)"
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
          </div>
        </div>
      </div>

      <!-- Info profesional -->
      <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
        <h3 class="mb-5 font-semibold text-black dark:text-white">Información Profesional</h3>
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
          <div>
            <label class="mb-2 block text-sm font-medium text-black dark:text-white">Cargo</label>
            <input type="text" [(ngModel)]="form.position" name="position" placeholder="Gerente, Director, Supervisor..."
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-black dark:text-white">Teléfono Alternativo</label>
            <input type="text" [(ngModel)]="form.phoneAlt" name="phoneAlt" placeholder="+1 809 000 0000"
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
          </div>
        </div>
        <div class="mt-5">
          <label class="mb-2 block text-sm font-medium text-black dark:text-white">Notas</label>
          <textarea [(ngModel)]="form.notes" name="notes" rows="3" placeholder="Observaciones, preferencias, información relevante..."
            class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white resize-none"></textarea>
        </div>
      </div>

      <!-- Estado + acciones -->
      <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
        <div class="flex flex-col gap-5 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h3 class="mb-1 font-semibold text-black dark:text-white">Estado</h3>
            <label class="flex cursor-pointer items-center gap-3 mt-2">
              <div class="relative">
                <input type="checkbox" [(ngModel)]="form.isActive" name="isActive" class="sr-only" />
                <div class="h-5 w-9 rounded-full transition" [class.bg-primary]="form.isActive" [class.bg-gray-300]="!form.isActive">
                  <div class="absolute top-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform"
                    [style.transform]="form.isActive ? 'translateX(1rem)' : 'translateX(0.125rem)'"></div>
                </div>
              </div>
              <span class="text-sm font-medium text-black dark:text-white">{{ form.isActive ? 'Activo' : 'Inactivo' }}</span>
            </label>
          </div>
          <div class="flex gap-3">
            <button type="button" (click)="onCancel()" [disabled]="loading"
              class="rounded-md border border-stroke px-6 py-3 font-medium text-black hover:bg-gray-2 dark:border-strokedark dark:text-white dark:hover:bg-meta-4 disabled:opacity-60">
              Cancelar
            </button>
            <button type="submit" [disabled]="loading"
              class="rounded-md bg-primary px-6 py-3 font-medium text-white hover:bg-opacity-90 disabled:opacity-60">
              {{ loading ? 'Guardando...' : (isEditMode ? 'Guardar Cambios' : 'Crear Cliente') }}
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
