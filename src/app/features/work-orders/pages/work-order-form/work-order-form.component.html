<div><app-page-breadcrumb [pageTitle]="isEditMode ? 'Editar Orden de Trabajo' : 'Nueva Orden de Trabajo'" /></div>

<div class="mx-auto max-w-screen-xl p-4 md:p-6 2xl:p-10">

  <!-- Loading estado de edición -->
  <div *ngIf="loadingData" class="flex items-center justify-center py-20">
    <div class="h-12 w-12 animate-spin rounded-full border-4 border-solid border-primary border-t-transparent"></div>
  </div>

  <div *ngIf="!loadingData">

    <!-- Header -->
    <div class="mb-6 flex items-center gap-4">
      <button (click)="onCancel()" class="text-sm text-gray-500 hover:text-primary transition-colors">← Volver</button>
      <h2 class="text-2xl font-bold text-black dark:text-white">
        {{ isEditMode ? 'Editar Orden de Trabajo' : 'Nueva Orden de Trabajo' }}
      </h2>
    </div>

    <!-- Error banner -->
    <div *ngIf="error" class="mb-5 rounded-md border border-red-200 bg-red-50 p-4 text-red-700 dark:border-red-800 dark:bg-red-900/20 dark:text-red-400">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 gap-5 lg:grid-cols-3">

        <!-- LEFT: main fields (2 cols) -->
        <div class="lg:col-span-2 space-y-5">

          <!-- Información básica -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-5 font-semibold text-black dark:text-white">Información General</h3>

            <!-- Título -->
            <div class="mb-5">
              <label class="mb-2 block text-sm font-medium text-black dark:text-white">
                Título <span class="text-red-500">*</span>
              </label>
              <input type="text" [(ngModel)]="form.title" name="title" required
                placeholder="Descripción breve de la tarea"
                class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
            </div>

            <!-- Descripción -->
            <div class="mb-5">
              <label class="mb-2 block text-sm font-medium text-black dark:text-white">
                Descripción
              </label>
              <textarea [(ngModel)]="form.description" name="description" rows="4"
                placeholder="Detalla el trabajo a realizar..."
                class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white resize-none"></textarea>
            </div>

            <!-- Notas internas -->
            <div>
              <label class="mb-2 block text-sm font-medium text-black dark:text-white">
                Notas internas
              </label>
              <textarea [(ngModel)]="form.notes" name="notes" rows="2"
                placeholder="Observaciones adicionales para el técnico..."
                class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white resize-none"></textarea>
            </div>
          </div>

          <!-- Asignación -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-5 font-semibold text-black dark:text-white">Asignación</h3>
            <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">ID de Empresa</label>
                <input type="number" [(ngModel)]="form.companyId" name="companyId"
                  placeholder="ID empresa"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">ID de Sitio</label>
                <input type="number" [(ngModel)]="form.siteId" name="siteId"
                  placeholder="ID sitio"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">ID de Activo</label>
                <input type="number" [(ngModel)]="form.assetId" name="assetId"
                  placeholder="ID activo"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">ID de Técnico</label>
                <input type="number" [(ngModel)]="form.assignedTechnicianId" name="assignedTechnicianId"
                  placeholder="ID técnico"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
            </div>
          </div>

          <!-- Programación -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-5 font-semibold text-black dark:text-white">Fechas y Horas</h3>
            <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Fecha límite</label>
                <input type="date" [(ngModel)]="form.dueDate" name="dueDate"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Horas estimadas</label>
                <input type="number" [(ngModel)]="form.estimatedHours" name="estimatedHours"
                  min="0" step="0.5" placeholder="Ej: 4.5"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Inicio programado</label>
                <input type="datetime-local" [(ngModel)]="form.scheduledStart" name="scheduledStart"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Fin programado</label>
                <input type="datetime-local" [(ngModel)]="form.scheduledEnd" name="scheduledEnd"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT: sidebar -->
        <div class="space-y-5">

          <!-- Prioridad -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-4 font-semibold text-black dark:text-white">Prioridad</h3>
            <div class="flex flex-col gap-2">
              <label *ngFor="let p of priorities"
                class="flex items-center gap-3 cursor-pointer rounded-lg border p-3 transition-colors"
                [class.border-primary]="form.priority === p.value"
                [class.bg-blue-50]="form.priority === p.value"
                [class.dark:bg-blue-900/20]="form.priority === p.value"
                [class.border-stroke]="form.priority !== p.value"
                [class.dark:border-strokedark]="form.priority !== p.value">
                <input type="radio" [(ngModel)]="form.priority" name="priority" [value]="p.value"
                  class="accent-primary" />
                <span class="text-sm font-medium text-black dark:text-white">{{ p.label }}</span>
              </label>
            </div>
          </div>

          <!-- Actions -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <button type="submit" [disabled]="loading"
              class="w-full rounded-md bg-primary py-3 font-medium text-white hover:bg-opacity-90 disabled:opacity-60 mb-3">
              <span *ngIf="loading">Guardando...</span>
              <span *ngIf="!loading">{{ isEditMode ? 'Guardar Cambios' : 'Crear Orden de Trabajo' }}</span>
            </button>
            <button type="button" (click)="onCancel()" [disabled]="loading"
              class="w-full rounded-md border border-stroke py-3 font-medium text-black hover:bg-gray-2 dark:border-strokedark dark:text-white dark:hover:bg-meta-4 disabled:opacity-60">
              Cancelar
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
