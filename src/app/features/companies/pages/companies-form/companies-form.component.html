<div><app-page-breadcrumb [pageTitle]="isEditMode ? 'Editar Empresa' : 'Nueva Empresa'" /></div>

<div class="mx-auto max-w-screen-md p-4 md:p-6 2xl:p-10">
  <div *ngIf="loadingData" class="flex justify-center py-20">
    <div class="h-12 w-12 animate-spin rounded-full border-4 border-solid border-primary border-t-transparent"></div>
  </div>

  <div *ngIf="!loadingData">
    <div class="mb-6 flex items-center gap-4">
      <button (click)="onCancel()" class="text-sm text-gray-500 hover:text-primary">← Volver</button>
      <h2 class="text-2xl font-bold text-black dark:text-white">{{ isEditMode ? 'Editar Empresa' : 'Nueva Empresa' }}</h2>
    </div>

    <div *ngIf="error" class="mb-5 rounded-md border border-red-200 bg-red-50 p-4 text-red-700 dark:border-red-800 dark:bg-red-900/20 dark:text-red-400">{{ error }}</div>

    <form (ngSubmit)="onSubmit()" class="space-y-5">

      <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
        <h3 class="mb-5 font-semibold text-black dark:text-white">Información de la Empresa</h3>
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
          <div class="sm:col-span-2">
            <label class="mb-2 block text-sm font-medium text-black dark:text-white">Nombre de la Empresa <span class="text-red-500">*</span></label>
            <input type="text" [(ngModel)]="form.name" name="name" required placeholder="Razón social de la empresa"
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-black dark:text-white">RNC / Tax ID</label>
            <input type="text" [(ngModel)]="form.taxId" name="taxId" placeholder="Número de identificación fiscal"
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-black dark:text-white">Teléfono</label>
            <input type="text" [(ngModel)]="form.phone" name="phone" placeholder="+1 809 000 0000"
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
          </div>
          <div class="sm:col-span-2">
            <label class="mb-2 block text-sm font-medium text-black dark:text-white">Email</label>
            <input type="email" [(ngModel)]="form.email" name="email" placeholder="contacto@empresa.com"
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
          </div>
          <div class="sm:col-span-2">
            <label class="mb-2 block text-sm font-medium text-black dark:text-white">Dirección</label>
            <input type="text" [(ngModel)]="form.address" name="address" placeholder="Dirección completa de la empresa"
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
          </div>
        </div>
      </div>

      <!-- Estado + acciones -->
      <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
        <div class="flex flex-col gap-5 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h3 class="mb-1 font-semibold text-black dark:text-white">Estado</h3>
            <label class="flex cursor-pointer items-center gap-3 mt-2">
              <div class="relative">
                <input type="checkbox" [(ngModel)]="form.isActive" name="isActive" class="sr-only" />
                <div class="h-5 w-9 rounded-full transition" [class.bg-primary]="form.isActive" [class.bg-gray-300]="!form.isActive">
                  <div class="absolute top-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform"
                    [style.transform]="form.isActive ? 'translateX(1rem)' : 'translateX(0.125rem)'"></div>
                </div>
              </div>
              <span class="text-sm font-medium text-black dark:text-white">{{ form.isActive ? 'Activa' : 'Inactiva' }}</span>
            </label>
          </div>
          <div class="flex gap-3">
            <button type="button" (click)="onCancel()" [disabled]="loading"
              class="rounded-md border border-stroke px-6 py-3 font-medium text-black hover:bg-gray-2 dark:border-strokedark dark:text-white dark:hover:bg-meta-4 disabled:opacity-60">
              Cancelar
            </button>
            <button type="submit" [disabled]="loading"
              class="rounded-md bg-primary px-6 py-3 font-medium text-white hover:bg-opacity-90 disabled:opacity-60">
              {{ loading ? 'Guardando...' : (isEditMode ? 'Guardar Cambios' : 'Crear Empresa') }}
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
