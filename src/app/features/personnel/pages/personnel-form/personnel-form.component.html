<div><app-page-breadcrumb [pageTitle]="isEditMode ? 'Editar Técnico' : 'Nuevo Técnico'" /></div>

<div class="mx-auto max-w-screen-lg p-4 md:p-6 2xl:p-10">

  <div *ngIf="loadingData" class="flex items-center justify-center py-20">
    <div class="h-12 w-12 animate-spin rounded-full border-4 border-solid border-primary border-t-transparent"></div>
  </div>

  <div *ngIf="!loadingData">
    <div class="mb-6 flex items-center gap-4">
      <button (click)="onCancel()" class="text-sm text-gray-500 hover:text-primary transition-colors">← Volver</button>
      <h2 class="text-2xl font-bold text-black dark:text-white">
        {{ isEditMode ? 'Editar Técnico' : 'Nuevo Técnico' }}
      </h2>
    </div>

    <div *ngIf="error" class="mb-5 rounded-md border border-red-200 bg-red-50 p-4 text-red-700 dark:border-red-800 dark:bg-red-900/20 dark:text-red-400">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 gap-5 lg:grid-cols-3">

        <!-- LEFT -->
        <div class="lg:col-span-2 space-y-5">

          <!-- Vinculación al usuario del sistema -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-2 font-semibold text-black dark:text-white">Vinculación al Sistema</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">
              Un técnico debe estar vinculado a un usuario del sistema. Ingresa el ID del usuario.
            </p>
            <div>
              <label class="mb-2 block text-sm font-medium text-black dark:text-white">
                ID de Usuario <span class="text-red-500">*</span>
              </label>
              <input type="number" [(ngModel)]="form.userId" name="userId" required min="1"
                placeholder="ID del usuario del sistema"
                [disabled]="isEditMode"
                class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white disabled:bg-gray-100 disabled:cursor-not-allowed dark:disabled:bg-gray-800" />
              <p *ngIf="isEditMode" class="mt-1 text-xs text-gray-400">
                El usuario vinculado no puede modificarse una vez creado.
              </p>
            </div>
          </div>

          <!-- Perfil profesional -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-5 font-semibold text-black dark:text-white">Perfil Profesional</h3>
            <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Nivel de Habilidad</label>
                <select [(ngModel)]="form.skillLevel" name="skillLevel"
                  class="w-full rounded-lg border border-stroke bg-transparent px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white">
                  <option value="">Sin especificar</option>
                  <option *ngFor="let s of skillLevels" [value]="s.value">{{ s.label }}</option>
                </select>
              </div>

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Tarifa por Hora (USD)</label>
                <input type="number" [(ngModel)]="form.hourlyRate" name="hourlyRate" min="0" step="0.5"
                  placeholder="Ej: 25.00"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>

              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Teléfono Alternativo</label>
                <input type="text" [(ngModel)]="form.phoneAlt" name="phoneAlt"
                  placeholder="Teléfono de contacto adicional"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
            </div>

            <div class="mt-5">
              <label class="mb-2 block text-sm font-medium text-black dark:text-white">Notas</label>
              <textarea [(ngModel)]="form.notes" name="notes" rows="3"
                placeholder="Especialidades, certificaciones, observaciones..."
                class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white resize-none"></textarea>
            </div>
          </div>
        </div>

        <!-- RIGHT: estado + acciones -->
        <div class="space-y-5">

          <!-- Nivel visual -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-4 font-semibold text-black dark:text-white">Nivel</h3>
            <div class="flex flex-col gap-2">
              <label *ngFor="let s of skillLevels"
                class="flex items-center gap-3 cursor-pointer rounded-lg border p-3 transition-colors"
                [class.border-primary]="form.skillLevel === s.value"
                [class.bg-blue-50]="form.skillLevel === s.value"
                [class.dark:bg-blue-900/20]="form.skillLevel === s.value"
                [class.border-stroke]="form.skillLevel !== s.value"
                [class.dark:border-strokedark]="form.skillLevel !== s.value">
                <input type="radio" [(ngModel)]="form.skillLevel" name="skillLevelRadio" [value]="s.value" class="accent-primary" />
                <span class="text-sm font-medium text-black dark:text-white">{{ s.label }}</span>
              </label>
            </div>
          </div>

          <!-- Estado activo -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-4 font-semibold text-black dark:text-white">Estado</h3>
            <label class="flex cursor-pointer items-center gap-3">
              <div class="relative">
                <input type="checkbox" [(ngModel)]="form.isActive" name="isActive" class="sr-only" />
                <div class="h-5 w-9 rounded-full transition"
                  [class.bg-primary]="form.isActive" [class.bg-gray-300]="!form.isActive">
                  <div class="absolute top-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform"
                    [style.transform]="form.isActive ? 'translateX(1rem)' : 'translateX(0.125rem)'"></div>
                </div>
              </div>
              <span class="text-sm font-medium text-black dark:text-white">
                {{ form.isActive ? 'Activo' : 'Inactivo' }}
              </span>
            </label>
          </div>

          <!-- Acciones -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <button type="submit" [disabled]="loading"
              class="w-full rounded-md bg-primary py-3 font-medium text-white hover:bg-opacity-90 disabled:opacity-60 mb-3">
              <span *ngIf="loading">Guardando...</span>
              <span *ngIf="!loading">{{ isEditMode ? 'Guardar Cambios' : 'Crear Técnico' }}</span>
            </button>
            <button type="button" (click)="onCancel()" [disabled]="loading"
              class="w-full rounded-md border border-stroke py-3 font-medium text-black hover:bg-gray-2 dark:border-strokedark dark:text-white dark:hover:bg-meta-4 disabled:opacity-60">
              Cancelar
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
