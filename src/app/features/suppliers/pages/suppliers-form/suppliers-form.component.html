<div><app-page-breadcrumb [pageTitle]="isEditMode ? 'Editar Proveedor' : 'Nuevo Proveedor'" /></div>

<div class="mx-auto max-w-screen-lg p-4 md:p-6 2xl:p-10">
  <div *ngIf="loadingData" class="flex justify-center py-20">
    <div class="h-12 w-12 animate-spin rounded-full border-4 border-solid border-primary border-t-transparent"></div>
  </div>

  <div *ngIf="!loadingData">
    <div class="mb-6 flex items-center gap-4">
      <button (click)="onCancel()" class="text-sm text-gray-500 hover:text-primary">← Volver</button>
      <h2 class="text-2xl font-bold text-black dark:text-white">{{ isEditMode ? 'Editar Proveedor' : 'Nuevo Proveedor' }}</h2>
    </div>

    <div *ngIf="error" class="mb-5 rounded-md border border-red-200 bg-red-50 p-4 text-red-700 dark:border-red-800 dark:bg-red-900/20 dark:text-red-400">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 gap-5 lg:grid-cols-3">

        <!-- LEFT (2 cols) -->
        <div class="lg:col-span-2 space-y-5">

          <!-- Info general -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-5 font-semibold text-black dark:text-white">Información General</h3>
            <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Nombre <span class="text-red-500">*</span></label>
                <input type="text" [(ngModel)]="form.name" name="name" required placeholder="Razón social o nombre comercial"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Código</label>
                <input type="text" [(ngModel)]="form.code" name="code" placeholder="Ej: PROV-001"
                  class="w-full rounded-lg border border-stroke px-4 py-3 font-mono outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Email <span class="text-red-500">*</span></label>
                <input type="email" [(ngModel)]="form.email" name="email" required placeholder="email@proveedor.com"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">RNC / Tax ID</label>
                <input type="text" [(ngModel)]="form.taxId" name="taxId" placeholder="Número de identificación fiscal"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Teléfono</label>
                <input type="text" [(ngModel)]="form.phone" name="phone" placeholder="+1 809 000 0000"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Móvil</label>
                <input type="text" [(ngModel)]="form.mobile" name="mobile" placeholder="+1 809 000 0000"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div class="sm:col-span-2">
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Sitio Web</label>
                <input type="url" [(ngModel)]="form.website" name="website" placeholder="https://proveedor.com"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
            </div>
            <div class="mt-5">
              <label class="mb-2 block text-sm font-medium text-black dark:text-white">Descripción</label>
              <textarea [(ngModel)]="form.description" name="description" rows="2" placeholder="Descripción del proveedor, especialidad, servicios..."
                class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white resize-none"></textarea>
            </div>
          </div>

          <!-- Contacto de referencia -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-5 font-semibold text-black dark:text-white">Persona de Contacto</h3>
            <div class="grid grid-cols-1 gap-5 sm:grid-cols-3">
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Nombre</label>
                <input type="text" [(ngModel)]="form.contactPerson" name="contactPerson" placeholder="Nombre del contacto"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Email</label>
                <input type="email" [(ngModel)]="form.contactEmail" name="contactEmail" placeholder="contacto@proveedor.com"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Teléfono</label>
                <input type="text" [(ngModel)]="form.contactPhone" name="contactPhone" placeholder="Teléfono directo"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
            </div>
          </div>

          <!-- Dirección -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-5 font-semibold text-black dark:text-white">Dirección</h3>
            <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
              <div class="sm:col-span-2">
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Calle / Dirección</label>
                <input type="text" [(ngModel)]="form.address!.street" name="street" placeholder="Calle, número, sector"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Ciudad</label>
                <input type="text" [(ngModel)]="form.address!.city" name="city" placeholder="Ciudad"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Estado / Provincia</label>
                <input type="text" [(ngModel)]="form.address!.state" name="state" placeholder="Estado o provincia"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">Código Postal</label>
                <input type="text" [(ngModel)]="form.address!.postalCode" name="postalCode"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-black dark:text-white">País</label>
                <input type="text" [(ngModel)]="form.address!.country" name="country" placeholder="País"
                  class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white" />
              </div>
            </div>
          </div>

          <!-- Notas -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-3 font-semibold text-black dark:text-white">Notas</h3>
            <textarea [(ngModel)]="form.notes" name="notes" rows="3" placeholder="Observaciones, condiciones de pago, tiempos de entrega..."
              class="w-full rounded-lg border border-stroke px-4 py-3 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input dark:text-white resize-none"></textarea>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="space-y-5">
          <!-- Tipo -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-4 font-semibold text-black dark:text-white">Tipo de Proveedor</h3>
            <div class="flex flex-col gap-2">
              <label *ngFor="let t of supplierTypes"
                class="flex items-center gap-3 cursor-pointer rounded-lg border p-3 transition-colors"
                [class.border-primary]="form.supplierType === t.value"
                [class.bg-blue-50]="form.supplierType === t.value"
                [class.dark:bg-blue-900/20]="form.supplierType === t.value"
                [class.border-stroke]="form.supplierType !== t.value"
                [class.dark:border-strokedark]="form.supplierType !== t.value">
                <input type="radio" [(ngModel)]="form.supplierType" name="supplierType" [value]="t.value" class="accent-primary" />
                <span class="text-lg">{{ t.icon }}</span>
                <span class="text-sm font-medium text-black dark:text-white">{{ t.label }}</span>
              </label>
            </div>
          </div>

          <!-- Estado -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <h3 class="mb-4 font-semibold text-black dark:text-white">Estado</h3>
            <label class="flex cursor-pointer items-center gap-3">
              <div class="relative">
                <input type="checkbox" [(ngModel)]="form.isActive" name="isActive" class="sr-only" />
                <div class="h-5 w-9 rounded-full transition" [class.bg-primary]="form.isActive" [class.bg-gray-300]="!form.isActive">
                  <div class="absolute top-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform"
                    [style.transform]="form.isActive ? 'translateX(1rem)' : 'translateX(0.125rem)'"></div>
                </div>
              </div>
              <span class="text-sm font-medium text-black dark:text-white">{{ form.isActive ? 'Activo' : 'Inactivo' }}</span>
            </label>
          </div>

          <!-- Acciones -->
          <div class="rounded-sm border border-stroke bg-white p-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <button type="submit" [disabled]="loading"
              class="w-full rounded-md bg-primary py-3 font-medium text-white hover:bg-opacity-90 disabled:opacity-60 mb-3">
              {{ loading ? 'Guardando...' : (isEditMode ? 'Guardar Cambios' : 'Crear Proveedor') }}
            </button>
            <button type="button" (click)="onCancel()" [disabled]="loading"
              class="w-full rounded-md border border-stroke py-3 font-medium text-black hover:bg-gray-2 dark:border-strokedark dark:text-white dark:hover:bg-meta-4 disabled:opacity-60">
              Cancelar
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
